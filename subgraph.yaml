specVersion: 1.0.0
indexerHints:
  prune: auto
description: Aetheron Sentinel L3 - Quantum-resistant bridge security with autonomous threat interception
repository: https://github.com/MastaTrill/Aetheron-Sentinel-L3
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: SentinelToken
    network: base
    source:
      address: '0x5FbDB2315678afecb367f032d93F642f64180aa3' # base deployment placeholder
      abi: SentinelToken
      startBlock: 1000000 # update after deployment
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/AssemblyScript
      entities:
        - Token
        - Staking
      abis:
        - name: SentinelToken
          file: ./abis/SentinelToken.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: Approval(indexed address,indexed address,uint256)
          handler: handleApproval
        - event: Staked(indexed address,uint256)
          handler: handleStaked
        - event: Unstaked(indexed address,uint256)
          handler: handleUnstaked
      file: ./src/sentinel-token.ts

  - kind: ethereum
    name: SentinelInterceptor
    network: base
    source:
      address: '0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0' # base deployment placeholder
      abi: SentinelInterceptor
      startBlock: 1000000 # update after deployment
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/AssemblyScript
      entities:
        - Sentinel
      abis:
        - name: SentinelInterceptor
          file: ./abis/SentinelInterceptor.json
      eventHandlers:
        - event: AnomalyDetected(uint256,uint256,uint256)
          handler: handleAnomalyDetected
        - event: AutonomousPauseTriggered(indexed address,uint256,uint256)
          handler: handleAutonomousPauseTriggered
        - event: TVLUpdated(uint256,uint256)
          handler: handleTVLUpdated
        - event: AutonomousModeToggled(bool)
          handler: handleAutonomousModeToggled
        - event: ThresholdUpdated(uint256,uint256,uint256)
          handler: handleThresholdUpdated
      file: ./src/sentinel-interceptor.ts

  - kind: ethereum
    name: AetheronBridge
    network: base
    source:
      address: '0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512' # base deployment placeholder
      abi: AetheronBridge
      startBlock: 1000000 # update after deployment
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/AssemblyScript
      entities:
        - Bridge
        - Transfer
      abis:
        - name: AetheronBridge
          file: ./abis/AetheronBridge.json
      eventHandlers:
        - event: TokensBridged(indexed address,indexed address,uint256,uint256,address,bytes32)
          handler: handleTokensBridged
        - event: TokensUnbridged(indexed address,indexed address,uint256,indexed bytes32)
          handler: handleTokensUnbridged
        - event: TransferCompleted(indexed bytes32)
          handler: handleTransferCompleted
        - event: BridgeInitialized(indexed address,indexed address,uint256)
          handler: handleBridgeInitialized
      file: ./src/bridge-events.ts

  - kind: ethereum
    name: RateLimiter
    network: base
    source:
      address: '0xDc64a140Aa3E981100a9becA4E685f962f0cF6C9' # base deployment placeholder
      abi: RateLimiter
      startBlock: 1000000 # update after deployment
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/AssemblyScript
      entities:
        - RateLimitStats
      abis:
        - name: RateLimiter
          file: ./abis/RateLimiter.json
      eventHandlers:
        - event: WithdrawalProcessed(indexed address,uint256,uint256,uint256)
          handler: handleWithdrawalProcessed
        - event: RateLimitUpdated(uint256,uint256,uint256)
          handler: handleRateLimitUpdated
        - event: ChainLimitSet(indexed uint256,uint256)
          handler: handleChainLimitSet
      file: ./src/rate-limiter.ts

  - kind: ethereum
    name: CircuitBreaker
    network: base
    source:
      address: '0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9' # base deployment placeholder
      abi: CircuitBreaker
      startBlock: 1000000 # update after deployment
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/AssemblyScript
      entities:
        - CircuitBreakerState
      abis:
        - name: CircuitBreaker
          file: ./abis/CircuitBreaker.json
      eventHandlers:
        - event: CircuitOpened(uint256,uint256)
          handler: handleCircuitOpened
        - event: CircuitHalfOpened(uint256)
          handler: handleCircuitHalfOpened
        - event: CircuitClosed(uint256)
          handler: handleCircuitClosed
        - event: FailureRecorded(indexed address,uint256)
          handler: handleFailureRecorded
        - event: SuccessRecorded(indexed address,uint256)
          handler: handleSuccessRecorded
      file: ./src/circuit-breaker.ts

  - kind: ethereum
    name: SentinelStaking
    network: base
    source:
      address: '0xB7f8BC63BbcaD18155201308C8f3540b07f84F5e' # base deployment placeholder
      abi: SentinelStaking
      startBlock: 1000000 # update after deployment
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/AssemblyScript
      entities:
        - StakingPosition
      abis:
        - name: SentinelStaking
          file: ./abis/SentinelStaking.json
      eventHandlers:
        - event: Staked(indexed address,uint256)
          handler: handleStaked
        - event: Unstaked(indexed address,uint256)
          handler: handleUnstaked
        - event: RewardsClaimed(indexed address,uint256)
          handler: handleRewardsClaimed
      file: ./src/sentinel-staking.ts

templates: []
