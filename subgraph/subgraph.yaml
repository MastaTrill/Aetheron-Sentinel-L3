specVersion: 1.0.0
indexerHints:
  prune: auto
description: Aetheron Sentinel L3 - Quantum-resistant bridge security with autonomous threat interception
repository: https://github.com/aetheron/sentinel-l3
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: SentinelInterceptor
    network: hardhat
    source:
      address: "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512" # Local deployment
      abi: SentinelInterceptor
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/AssemblyScript
      entities:
        - Sentinel
        - AnomalyAlert
        - PauseEvent
      abis:
        - name: SentinelInterceptor
          file: ../abis/SentinelInterceptor.json
      eventHandlers:
        - event: AnomalyDetected(uint256,uint256,uint256)
          handler: handleAnomalyDetected
      file: ./src/sentinel-interceptor.ts

  - kind: ethereum
    name: AetheronBridge
    network: hardhat
    source:
      address: "0x5FbDB2315678afecb367f032d93F642f64180aa3" # Local deployment
      abi: AetheronBridge
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/AssemblyScript
      entities:
        - Bridge
        - Transfer
      abis:
        - name: AetheronBridge
          file: ../abis/AetheronBridge.json
      eventHandlers:
        - event: TokensBridged(indexed address,indexed address,uint256,uint256,address,bytes32)
          handler: handleTokensBridged
        - event: TokensUnbridged(indexed address,indexed address,uint256,indexed bytes32)
          handler: handleTokensUnbridged
        - event: TransferCompleted(indexed bytes32)
          handler: handleTransferCompleted
        - event: BridgeInitialized(indexed address,indexed address,uint256)
          handler: handleBridgeInitialized
      file: ./src/bridge-events.ts

