name: Full Security Scan

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build + Coverage + Gas
        run: |
          forge build
          forge coverage --report lcov
          forge test --gas-report

      - name: Slither
        uses: crytic/slither-action@v0.4.2
        id: slither
        with:
          target: '.'
          config: slither.config.json
          sarif: results-slither.sarif
          fail-on: high
          ignore-compile: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results-slither.sarif
          category: slither

      - name: PR Security Summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            let summary = '## 🛡️ Aetheron Sentinel L3 Security Report\n\n';
            summary += '✅ Build & Coverage: Done\n';
            summary += '✅ Gas Report: Generated\n';
            summary += '✅ Slither: Completed\n';
            summary += '\nFull details → Security → Code scanning tab';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
