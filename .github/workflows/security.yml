name: Security Scan (Slither + Foundry)

on:
  push:
    branches: [ main, master, develop ]
    paths: [ 'src/**', '**/*.sol', 'slither.config.json', 'foundry.toml' ]
  pull_request:
    branches: [ main, master, develop ]
    paths: [ 'src/**', '**/*.sol', 'slither.config.json', 'foundry.toml' ]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build contracts
        run: forge build

      - name: Run Forge Tests with Gas Report
        run: forge test --gas-report

      - name: Run Slither Analysis
        uses: crytic/slither-action@v0.4.2
        id: slither
        with:
          target: '.'
          config: slither.config.json
          sarif: results.sarif
          fail-on: high
          ignore-compile: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: slither

      - name: Post PR Comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            let summary = '## 🛡️ Sentinel L3 Security Report\n\n';
            if (${{ steps.slither.outputs.exit-code }} == 0) {
              summary += '✅ **No high severity issues found.**\n';
            } else {
              summary += '⚠️ **Issues detected** — Check GitHub Security tab.\n';
            }
            summary += `\n**Exit Code:** ${{ steps.slither.outputs.exit-code }}\n`;
            summary += '**Tests + Gas Report:** Completed\n';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
