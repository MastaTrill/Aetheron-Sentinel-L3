name: Security Scan (Slither + Mythril + Foundry)

on:
  push:
    branches: [ main, master, develop ]
    paths: [ 'src/**', '**/*.sol', 'slither.config.json', 'foundry.toml' ]
  pull_request:
    branches: [ main, master, develop ]
    paths: [ 'src/**', '**/*.sol', 'slither.config.json', 'foundry.toml' ]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build contracts
        run: forge build

      - name: Run Forge Tests with Gas Report
        run: forge test --gas-report

      # === Slither ===
      - name: Run Slither Analysis
        uses: crytic/slither-action@v0.4.2
        id: slither
        with:
          target: '.'
          config: slither.config.json
          sarif: results-slither.sarif
          fail-on: high
          ignore-compile: true

      # === Mythril ===
      - name: Run Mythril Analysis
        uses: crytic/mythril-action@v0.1.0
        id: mythril
        with:
          target: 'src'
          solc_version: '0.8.30'
          timeout: 300
          # Optional: limit to high severity
          args: '--execution-timeout 300 --max-depth 512'

      - name: Upload Slither SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results-slither.sarif
          category: slither

      - name: Post PR Comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            let summary = '## 🛡️ Aetheron Sentinel L3 Security Report\n\n';
            summary += '**Slither:** ' + (${{ steps.slither.outputs.exit-code }} == 0 ? '✅ Clean' : '⚠️ Issues') + '\n';
            summary += '**Mythril:** Completed (check logs for findings)\n';
            summary += '**Tests + Gas:** Completed\n\n';
            summary += 'Full results available in **Security → Code scanning** tab.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
