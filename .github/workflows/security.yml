name: Full Security Scan

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build Contracts
        run: forge build

      - name: Run Tests + Gas Report
        run: forge test --gas-report

      - name: Run Slither
        uses: crytic/slither-action@v0.4.2
        id: slither
        with:
          target: '.'
          config: slither.config.json
          sarif: results-slither.sarif
          fail-on: high
          ignore-compile: true

      - name: Upload Slither Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results-slither.sarif
          category: slither

      - name: Post PR Summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            let summary = '## 🛡️ Sentinel L3 Security Report\n\n';
            if (${{ steps.slither.outputs.exit-code }} == 0) {
              summary += '✅ **Slither:** No high severity issues\n';
            } else {
              summary += '⚠️ **Slither:** Issues found - check Security tab\n';
            }
            summary += '**Tests + Gas Report:** Completed\n';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
