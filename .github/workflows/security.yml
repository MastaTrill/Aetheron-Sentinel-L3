name: Full Security Scan

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build & Gas Report
        run: forge build && forge test --gas-report

      # Slither
      - name: Slither
        uses: crytic/slither-action@v0.4.2
        id: slither
        with:
          target: '.'
          config: slither.config.json
          sarif: results-slither.sarif
          fail-on: high
          ignore-compile: true

      # Mythril
      - name: Mythril
        uses: crytic/mythril-action@v0.1.0
        with:
          target: 'src'
          solc_version: '0.8.30'
          timeout: 240

      # Aderyn (Modern Auditor)
      - name: Aderyn
        uses: crytic/aderyn-action@v0.1.0
        with:
          path: '.'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results-slither.sarif
          category: slither

      - name: PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = '## 🛡️ Aetheron Sentinel L3 Full Security Report\n\n' +
              '✅ **Build & Tests** completed\n' +
              '✅ **Slither** ran\n' +
              '✅ **Mythril** ran\n' +
              '✅ **Aderyn** ran\n\n' +
              'Full details in **Security → Code scanning**';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
