name: Aetheron Sentinel L3 Deployment
on:
  workflow_dispatch:
    inputs:
      confirm_deployment:
        description: 'Type "CONFIRM" to proceed with deployment'
        required: true
  # Disabled automatic deployment on push to prevent accidental deployments
  # push:
  #   branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # Fixes Bootstrap Deadlock
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Verify deployment doc links
        run: node scripts/check-markdown-links.cjs
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install Slim Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.2.1+cpu --extra-index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir -r requirements.txt
      - name: Sentinel-Zero Lean Audit
        run: python scripts/audit_runtime.py --mode=lean

