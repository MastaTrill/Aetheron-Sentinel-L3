name: Aetheron Sentinel L3 Deployment
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Fixes Bootstrap Deadlock
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install Slim Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.2.1+cpu --extra-index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir -r requirements.txt
      - name: Sentinel-Zero Lean Audit
        run: python scripts/audit_runtime.py --mode=lean
