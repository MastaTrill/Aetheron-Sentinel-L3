name: PR Validation

on:
  pull_request:
    branches: [ main, master, develop ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: forge build

      - name: Fast Tests
        run: forge test --no-match-test testFuzz
