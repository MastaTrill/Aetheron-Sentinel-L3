name: PR Validation (Fast)

on:
  pull_request:
    branches: [ main, master, develop ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build
        run: forge build

      - name: Quick Tests
        run: forge test --no-match-test testFuzz

      - name: Slither (Fast Check)
        uses: crytic/slither-action@v0.4.2
        with:
          target: '.'
          config: slither.config.json
          fail-on: high
          ignore-compile: true
