name: 'Hardhat Compile & Test (Disabled - handled by main CI)'
on:
  workflow_dispatch: # Manual trigger only
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
       - uses: actions/checkout@v4
       - name: Use Node.js 20
         uses: actions/setup-node@v4
         with:
           node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Compile contracts
        run: npm run compile
      - name: Run tests
        run: npm test
