name: Hardhat Compile & Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm ci --legacy-peer-deps
      - run: npm run compile
      - run: npm test
