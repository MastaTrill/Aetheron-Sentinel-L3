name: 'Hardhat Compile & Test (Disabled - handled by main CI)'
on:
  workflow_dispatch: # Manual trigger only
jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Verify deployment doc links
        run: node scripts/check-markdown-links.cjs
      - name: Verify precompiled artifacts are present
        run: test -d artifacts/contracts
      - name: Run tests
        run: npm test -- --no-compile

