name: Python unit tests (3.11)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: PR mode note
        if: github.event_name == 'pull_request'
        run: echo "Skipping Python unittest discovery in PR mode."
      - name: Run Python tests if present
        if: github.event_name == 'push'
        run: |
          if [ -d tests ]; then
            PYTHONPATH=src python -m unittest discover -s tests -p 'test_*.py' -v
          else
            echo "No root tests/ directory present; nothing to run."
          fi
