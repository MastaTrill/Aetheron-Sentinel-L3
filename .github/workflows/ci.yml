name: CI/CD Pipeline (Foundry)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: forge build
      - run: forge test -vvv

  security:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: forge build
      - run: forge test -vvv

      - name: Run Slither
        uses: crytic/slither-action@v0.4.2
        with:
          target: '.'
          config: slither.config.json
          sarif: results.sarif
          fail-on: high
          ignore-compile: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: slither
