name: CI/CD Pipeline (Foundry)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: forge build
      - run: forge test --no-match-test testFuzz  # Faster: skip heavy fuzz tests

  security:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: forge build
      - run: forge test --gas-report
