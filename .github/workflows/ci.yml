name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hardhat:
    name: Hardhat (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Run Hardhat tests
        run: npm test

  sepolia-verification-gate:
    name: Sepolia verification gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Section 7 ownership sweep
        run: node scripts/section7-final-sweep.cjs

      - name: Run allowlist audit
        run: node scripts/audit-allowlists.cjs

      - name: Run bridge relayer verification
        env:
          RELAYER_ADDRESSES: '0xA1B9CF0F48F815cE80ed2aB203fa7c0C8299A0fB'
        run: node scripts/verify-bridge-relayers.cjs

  subgraph-build:
    name: Subgraph build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run codegen
        run: npx graph codegen

      - name: Build subgraph WASM
        run: npx graph build

  remix-import-build:
    name: Remix import build
    runs-on: ubuntu-latest
    timeout-minutes: 12

    defaults:
      run:
        working-directory: imports/remix_-aetheron-sentinel-l3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: imports/remix_-aetheron-sentinel-l3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build Remix import app
        run: npm run build

  promote-gate:
    name: Promote gate
    runs-on: ubuntu-latest
    needs:
      - hardhat
      - sepolia-verification-gate
      - subgraph-build
      - remix-import-build

    steps:
      - name: Promotion gate summary
        run: echo "All CI and Sepolia verification checks passed. Safe to promote/deploy."
