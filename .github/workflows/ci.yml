name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - bmnr-observability-hardening

jobs:
  python-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run CI matrix
        run: bash scripts/ci_matrix.sh
