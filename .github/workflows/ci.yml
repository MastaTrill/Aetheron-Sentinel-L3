name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hardhat:
    name: Hardhat (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Run Hardhat tests
        run: npm test

  python-tests:
    name: Python unit tests (3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Python unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -p "test_*.py" -v

  sepolia-verification-gate:
    name: Sepolia verification gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Section 7 ownership sweep
        run: node scripts/section7-final-sweep.cjs

      - name: Run allowlist audit
        run: node scripts/audit-allowlists.cjs

      - name: Run bridge relayer verification
        env:
          RELAYER_ADDRESSES: '0xA1B9CF0F48F815cE80ed2aB203fa7c0C8299A0fB'
        run: node scripts/verify-bridge-relayers.cjs

  subgraph-build:
    name: Subgraph build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run codegen
        run: npm run codegen

      - name: Build subgraph WASM
        run: npm run build

  promote-gate:
    name: Promote gate
    runs-on: ubuntu-latest
    needs:
      - hardhat
      - python-tests
      - sepolia-verification-gate
      - subgraph-build

    steps:
      - name: Promotion gate summary
        run: echo "All CI and Sepolia verification checks passed. Safe to promote/deploy."
