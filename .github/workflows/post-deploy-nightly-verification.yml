name: Post-deploy and nightly verification

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this run is being triggered (for example: post-deploy)'
        required: false
        default: post-deploy
  schedule:
    - cron: '15 2 * * *'

permissions:
  contents: read

concurrency:
  group: verification-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-sepolia:
    name: Verify Sepolia controls
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Section 7 ownership sweep
        run: |
          mkdir -p logs/verification/ci
          node scripts/section7-final-sweep.cjs | tee logs/verification/ci/section7-final-sweep.log

      - name: Run allowlist audit
        run: |
          node scripts/audit-allowlists.cjs | tee logs/verification/ci/audit-allowlists.log

      - name: Run bridge relayer verification
        env:
          RELAYER_ADDRESSES: 0xA1B9CF0F48F815cE80ed2aB203fa7c0C8299A0fB
        run: |
          node scripts/verify-bridge-relayers.cjs | tee logs/verification/ci/verify-bridge-relayers.log

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sepolia-verification-logs-${{ github.run_id }}
          path: logs/verification/ci/*.log
          if-no-files-found: warn

  audit-dependencies:
    name: Audit npm dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Create audit directory
        run: mkdir -p logs/verification/ci/audit

      - name: Audit root workspace
        run: |
          npm audit --json > logs/verification/ci/audit/root-audit.json || true
          npm audit | tee logs/verification/ci/audit/root-audit.txt

      - name: Audit apps/remix-dashboard workspace
        run: |
          npm audit --workspace=apps/remix-dashboard --json > logs/verification/ci/audit/apps-remix-dashboard-audit.json || true
          npm audit --workspace=apps/remix-dashboard | tee logs/verification/ci/audit/apps-remix-dashboard-audit.txt

      - name: Audit imports/remix_-aetheron-sentinel-l3 workspace
        run: |
          npm audit --workspace=imports/remix_-aetheron-sentinel-l3 --json > logs/verification/ci/audit/imports-remix-audit.json || true
          npm audit --workspace=imports/remix_-aetheron-sentinel-l3 | tee logs/verification/ci/audit/imports-remix-audit.txt

      - name: Check for vulnerabilities
        run: |
          echo "=== Audit Summary ==="
          for file in logs/verification/ci/audit/*.json; do
            echo "File: $file"
            cat "$file" | jq '.metadata | {vulnerabilities, audited}'
          done

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-logs-${{ github.run_id }}
          path: logs/verification/ci/audit/
          if-no-files-found: warn

      - name: Fail if vulnerabilities found
        run: |
          TOTAL_VULNS=0
          for file in logs/verification/ci/audit/*.json; do
            VULNS=$(cat "$file" | jq '.metadata.vulnerabilities' 2>/dev/null || echo 0)
            TOTAL_VULNS=$((TOTAL_VULNS + VULNS))
          done
          if [ $TOTAL_VULNS -gt 0 ]; then
            echo "❌ Found $TOTAL_VULNS vulnerabilities across workspaces"
            exit 1
          else
            echo "✅ No vulnerabilities found across all workspaces"
          fi
