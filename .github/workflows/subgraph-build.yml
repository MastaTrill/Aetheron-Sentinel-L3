name: Subgraph build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  subgraph-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: PR mode note
        if: github.event_name == 'pull_request'
        run: echo "Skipping subgraph install/build in PR mode."
      - name: Install dependencies
        if: github.event_name == 'push'
        run: npm ci --legacy-peer-deps
      - name: Build subgraph artifacts
        if: github.event_name == 'push'
        run: |
          npm run codegen
          npm run build
