[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.30"

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "chainlink-brownie-contracts/=lib/chainlink-brownie-contracts/",
    "solidity-examples/=lib/solidity-examples/"
]
