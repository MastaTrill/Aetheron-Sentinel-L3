[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200

# Gas & Test settings
gas_reports = ["*"]
gas_price = 1
fuzz_runs = 1000

[rpc_endpoints]
base = "https://mainnet.base.org"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
