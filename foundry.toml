[profile.default]
src = "contracts"
out = "out"
libs = ["lib", "node_modules"]
auto_detect_solc = true
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@openzeppelin/contracts-cross-chain/=lib/openzeppelin-contracts-cross-chain/contracts/",
    "@account-abstraction/contracts/=node_modules/@account-abstraction/contracts/",
    "forge-std/=lib/forge-std/src/",
    "@uniswap/=node_modules/@uniswap/",
    "account-abstraction/=lib/account-abstraction/contracts/",
    "base64-sol/=node_modules/base64-sol/",
    "ds-test/=lib/openzeppelin-contracts/lib/forge-std/lib/ds-test/src/",
    "erc4626-tests/=lib/openzeppelin-contracts/lib/erc4626-tests/",
    "eth-gas-reporter/=node_modules/eth-gas-reporter/",
    "halmos-cheatcodes/=lib/openzeppelin-contracts/lib/halmos-cheatcodes/src/",
    "hardhat/=node_modules/hardhat/",
    "openzeppelin-contracts-cross-chain/=lib/openzeppelin-contracts-cross-chain/contracts/",
    "openzeppelin-contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/",
    "openzeppelin-contracts/=lib/openzeppelin-contracts/",
    "openzeppelin/=lib/openzeppelin-contracts/contracts/"
]

[profile.ci]
verbosity = 4

[profile.hardhat]
src = "contracts-foundry"
out = "out-foundry"
solc = "0.8.20"

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
basegork = "${BASEGORK_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
