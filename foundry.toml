[profile.default]
src = "contracts"
out = "out"
libs = ["lib", "node_modules"]
auto_detect_solc = true
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.ci]
fuzz_runs = 10000
verbosity = 4

[profile.hardhat]
src = "contracts-foundry"
out = "out-foundry"
solc = "0.8.20"

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
basegork = "${BASEGORK_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
